<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ededed">
<title>AI 角色聊天</title>
<style>
:root{--bg:#ededed;--surface:#fff;--surface2:#f5f5f5;--border:#e5e5e5;--text:#1a1a1a;--text2:#999;--msg-user:#95ec69;--msg-ai:#fff;--primary:#07c160;--primary-dark:#06ad56;--danger:#fa5151;--tag-bg:#e8f8ee;--tag-color:#07c160;--radius:18px;--radius-sm:8px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--surface)}
/* Header */
.header{display:flex;align-items:center;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);min-height:52px;flex-shrink:0;position:sticky;top:0;z-index:10;padding-top:env(safe-area-inset-top,10px)}
.header h1{font-size:17px;font-weight:600;flex:1;text-align:center;margin:0 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.back-btn{font-size:22px;cursor:pointer;background:none;border:none;color:var(--primary);padding:4px;display:none;width:36px;height:36px;align-items:center;justify-content:center;font-weight:500}
.hrbtn{background:var(--surface2);border:none;color:var(--text);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap;font-weight:500}
.hrbtn.active{background:var(--primary);color:#fff}
/* Screens */
.scr{display:none;flex:1;flex-direction:column;overflow:hidden}
.scr.active{display:flex}
/* Character list */
.chat-list2{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.char-card{background:var(--surface);border-radius:12px;padding:14px;cursor:pointer;border:1px solid var(--border);transition:all .1s}
.char-card:active{background:var(--surface2)}
.char-card .name{font-size:16px;font-weight:600}
.char-card .tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.char-card .tag{font-size:11px;background:var(--tag-bg);color:var(--tag-color);padding:2px 8px;border-radius:10px;font-weight:500}
.char-card .desc{font-size:13px;color:var(--text2);margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.char-card-actions{margin-top:10px}
.char-card-actions .del-btn{width:100%;padding:10px;background:var(--danger);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500}
/* Tabs */
.dtabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.dtabs button{flex:1;background:none;border:none;color:var(--text2);padding:10px 0;font-size:14px;cursor:pointer;position:relative;font-weight:500}
.dtabs button.active{color:var(--primary);font-weight:600}
.dtabs button.active::after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:24px;height:3px;background:var(--primary);border-radius:2px}
.tab{display:none;flex:1;flex-direction:column;overflow:hidden}
.tab.active{display:flex}
/* Chat - key fix: flex column keeps input at bottom */
#tab-chat{flex:1;display:none;flex-direction:column;overflow:hidden;background:var(--bg)}
#tab-chat.active{display:flex}
.chtmsg{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.chtmsg:empty{justify-content:center;align-items:center}
.msg{max-width:80%;padding:8px 14px;border-radius:var(--radius);font-size:15px;line-height:1.55;word-break:break-word;position:relative;animation:fadeIn .15s;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.msg.user{align-self:flex-end;background:var(--msg-user);color:var(--text);border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:var(--msg-ai);border-bottom-left-radius:4px;border:1px solid var(--border);box-shadow:0 1px 2px rgba(0,0,0,.03)}
.msg .time{font-size:10px;color:var(--text2);margin-top:4px;opacity:.7}
.msg .spk{position:absolute;bottom:2px;right:-30px;background:none;border:none;color:var(--text2);font-size:16px;cursor:pointer;opacity:.4;padding:4px;transition:opacity .1s}
.msg:hover .spk,.msg .spk:active{opacity:.8}
.empty-state{padding:20px;text-align:center;color:var(--text2);font-size:13px;line-height:1.6}
/* Input bar - fixed at bottom */
.cwrap{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding:8px 12px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px))}
.crow{display:flex;align-items:flex-end;gap:6px}
.crow textarea{flex:1;background:var(--surface2);border:none;border-radius:20px;color:var(--text);padding:9px 14px;font-size:16px;resize:none;outline:none;font-family:inherit;min-height:38px;max-height:100px;line-height:1.4}
.crow textarea:focus{background:#e8e8e8}
.ctbtn{background:none;border:none;color:var(--text2);width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;flex-shrink:0;border-radius:50%;transition:background .1s}
.ctbtn:active{background:var(--surface2)}
.ctbtn.snd{background:var(--primary);color:#fff;border-radius:50%;width:38px;height:38px;font-size:18px;transform:rotate(-90deg)}
.ctbtn.snd:disabled{opacity:.4}
.ctbtn.active{background:var(--danger);color:#fff;animation:pulse 1s infinite;font-size:20px}
/* TTS bar */
.ttsbar{display:none;align-items:center;gap:6px;padding:6px 16px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.ttsbar.show{display:flex}
.ttsbar label{font-size:11px;color:var(--text2);min-width:24px}
.ttsbar input[type=range]{flex:1;height:3px;accent-color:var(--primary);max-width:100px}
.ttsbar .tv{font-size:11px;color:var(--text2);min-width:20px;text-align:center}
/* Voice indicator */
.vi{display:none;align-items:center;justify-content:center;gap:10px;padding:12px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.vi.active{display:flex}
.vw{display:flex;align-items:center;gap:2px;height:24px}
.vw span{display:inline-block;width:3px;background:var(--primary);border-radius:2px;animation:wave 1s ease-in-out infinite}
.vw span:nth-child(1){height:10px;animation-delay:0s}
.vw span:nth-child(2){height:16px;animation-delay:.12s}
.vw span:nth-child(3){height:22px;animation-delay:.24s}
.vw span:nth-child(4){height:16px;animation-delay:.36s}
.vw span:nth-child(5){height:10px;animation-delay:.48s}
.vt{font-size:13px;color:var(--text2)}
.vi .vcl{background:var(--surface2);border:none;border-radius:6px;padding:5px 12px;color:var(--danger);font-size:12px;cursor:pointer}
/* Image preview row */
.iprev{display:flex;gap:6px;padding:4px 12px 0;overflow-x:auto;flex-shrink:0}
.iprev .thumb{width:44px;height:44px;position:relative;flex-shrink:0;border-radius:8px;overflow:hidden}
.iprev .thumb img{width:44px;height:44px;object-fit:cover}
.iprev .thumb .remove{position:absolute;top:-3px;right:-3px;width:16px;height:16px;background:rgba(0,0,0,.5);border-radius:50%;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
/* Editor */
.ed{padding:16px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ed label{font-size:13px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500}
.ed .hint{font-size:11px;color:var(--text2);margin-top:3px;opacity:.7}
.ed input,.ed textarea,.ed select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 14px;font-size:14px;outline:none;font-family:inherit;transition:border .1s}
.ed input:focus,.ed textarea:focus{border-color:var(--primary);background:#fff}
.ed textarea{min-height:70px;resize:vertical}
.ed .tag-selector{display:flex;flex-wrap:wrap;gap:6px}
.ed .tag-selector button{padding:6px 14px;border-radius:16px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;transition:all .1s}
.ed .tag-selector button.sel{background:var(--tag-bg);color:var(--tag-color);border-color:var(--tag-color)}
.ed .save-btn{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:13px;font-size:16px;cursor:pointer;font-weight:600}
.ed .delete-char-btn{color:var(--danger);border:1px solid var(--danger);background:transparent;border-radius:10px;padding:13px;font-size:14px;cursor:pointer;width:100%}
/* Traits */
.tab-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tlist{padding:16px;display:flex;flex-direction:column;gap:8px}
.trait-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center}
.trait-item .key{font-weight:600;font-size:14px}
.trait-item .val{font-size:13px;color:var(--text2);margin-top:2px}
.trait-item .trait-actions button{background:none;border:none;cursor:pointer;color:var(--danger);font-size:16px;padding:4px}
.trait-add-bar{display:flex;gap:6px;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.trait-add-bar input{flex:1;min-width:70px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;outline:none}
.trait-add-bar input:focus{border-color:var(--primary)}
.trait-add-bar button{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:500}
/* Bottom nav */
.bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.bottom-nav button{flex:1;background:none;border:none;color:var(--text2);padding:7px 0;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;transition:color .1s}
.bottom-nav button.active{color:var(--primary)}
.bottom-nav button .icon{font-size:22px}
.loading{display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes wave{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:200;display:none;backdrop-filter:blur(8px)}
.toast.show{display:block;animation:fadeIn .15s}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:24px;max-width:300px;width:100%;text-align:center}
.modal-box h3{font-size:17px;margin-bottom:8px;font-weight:600}
.modal-box p{font-size:14px;color:#666;margin-bottom:20px;line-height:1.5}
.modal-actions{display:flex;gap:10px}
.modal-actions button{flex:1;padding:11px;border-radius:10px;border:none;cursor:pointer;font-size:15px;font-weight:500}
.modal-actions .confirm-btn{background:var(--danger);color:#fff}
.modal-actions .vcl{background:var(--surface2);color:var(--text);border:1px solid var(--border)}</style>
</head>
<body><div class="app" id="app">
  <div id="header"><button class="hback" id="hback" onclick="showScr('list')">←</button><div class="htitle" id="htitle">AI 角色</div><button class="hadd" id="hadd" onclick="newCharacter()">+</button><button class="hrbtn" id="ttsBtn" onclick="toggleTTS()">朗读</button><button class="hrbtn" id="voiceBtn" onclick="toggleVoiceMode()">U0001f3a4</button></div>
  <div class="scr active" id="s-list"><div class="chat-list" id="chatList"></div></div>
  <div class="scr" id="s-detail">
    <div class="dtabs" id="detailTabs">
      <button class="active" data-tab="chat">聊天</button>
      <button data-tab="traits">记忆</button>
      <button data-tab="edit">设定</button>
    </div>
    <!-- Tab: Chat (flex column, input at bottom) -->
    <div class="tab active" id="tab-chat">
      <div class="chtmsg" id="chtmsg"></div>
      <div class="ttsbar" id="ttsbar">
        <label>语速</label><input type="range" id="ttsRate" min="5" max="15" value="9"><span class="tv" id="ttsRateV">0.9</span>
        <label>音调</label><input type="range" id="ttsPitch" min="5" max="15" value="10"><span class="tv" id="ttsPitchV">1.0</span>
      </div>
      <div class="vi" id="vi">
        <div class="vw"><span></span><span></span><span></span><span></span><span></span></div>
        <span class="vt" id="vt">正在聆听...</span>
        <button class="vcl" onclick="stopVoice()">取消</button>
      </div>
      <div class="iprev" id="iprev"></div>
      <div class="cwrap">
        <div class="crow">
          <button class="ctbtn" id="micBtn" onclick="startVoice()">🎤</button>
          <textarea id="chatIn" rows="1" placeholder="输入消息..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
          <button class="ctbtn" onclick="document.getElementById('imgInput').click()">🖼</button>
          <button class="ctbtn snd" id="sendBtn" onclick="sendMsg()">↵</button>
          <input type="file" id="imgIn" accept="image/*" capture="environment" style="display:none" onchange="onImgPick(event)">
        </div>
      </div>
    </div>
    <!-- Tab: Traits -->
    <div class="tab" id="tab-traits">
      <div class="trait-add-bar">
        <input id="traitKey" placeholder="特征名"><input id="traitVal" placeholder="特征值">
        <button onclick="addTrait()">添加</button>
      </div>
      <div class="tab-scroll"><div class="tlist" id="tlist"></div></div>
    </div>
    <!-- Tab: Edit -->
    <div class="tab" id="tab-edit"><div class="ed" id="ed"></div></div>
  </div>
  
</div>
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3 id="mT">确认删除？</h3>
    <p id="mB">此操作不可恢复。</p>
    <div class="modal-actions">
      <button class="vcl" id="mCcl">取消</button>
      <button class="confirm-btn" id="mCnf">确认删除</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const S={characters:[],curChar:null,curConv:null,currentTab:'chat',sending:false,pendingImg:[],vMode:false,rec:false,tts:false,sr:null,cb:null};

const API={async get(p){const r=await fetch(p);if(!r.ok)throw await r.json();return r.json()},async post(p,b){const r=await fetch(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});if(!r.ok)throw await r.json();return r.json()},async put(p,b){const r=await fetch(p,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});if(!r.ok)throw await r.json();return r.json()},async del(p){const r=await fetch(p,{method:'DELETE'});if(!r.ok)throw await r.json();return r.json()},async upload(file){const fd=new FormData();fd.append('file',file);const r=await fetch('/api/upload/image',{method:'POST',body:fd});if(!r.ok)throw await r.json();return r.json()}};

function confirm(t,b,on){document.getElementById('modalTitle').textContent=t;document.getElementById('modalBody').textContent=b;document.getElementById('confirmModal').classList.add('show');S.cb=on}
document.getElementById('modalConfirm').onclick=()=>{document.getElementById('confirmModal').classList.remove('show');if(S.cb)S.cb()};
document.getElementById('modalCancel').onclick=()=>{document.getElementById('confirmModal').classList.remove('show')};

function showScr(n){document.querySelectorAll(".scr").forEach(s=>s.classList.remove("active"));document.getElementById("s-"+n).classList.add("active");var dt=n==="detail";document.getElementById("hback").style.display=dt?"flex":"none";document.getElementById("hadd").style.display=dt?"none":"flex";document.getElementById("htitle").textContent=dt?(S.chars.find(x=>x.id===S.curChar)||{}).name||"AI":"AI \u89d2\u8272";document.getElementById("ttsBtn").style.display=dt?"block":"none";document.getElementById("voiceBtn").style.display=dt?"block":"none";document.getElementById("voiceBtn").textContent=S.vMode?"\U0001f50a":"\U0001f3a4";if(n==="list")loadList();}

function openChar(id){
  S.curChar=id;S.curConv=null;S.pendingImg=[];
  showScr("detail");
  document.getElementById('headerTitle').textContent=(S.chars.find(x=>x.id===id)||{}).name||'角色';
  document.getElementById('imgPreview').innerHTML='';updateTTSBtn();switchTab('chat');loadChat();loadTraits();loadEditor();
}
function switchTab(t){S.currentTab=t;document.querySelectorAll('.dtabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.id==='tab-'+t));if(t==='chat')scrollChat();if(t==='traits')loadTraits();if(t==='edit')loadEditor()}
document.querySelectorAll('.dtabs button').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));

async function loadList(){try{S.characters=await API.get('/api/characters')}catch{}renderList()}
function renderList(){
  const g=document.getElementById("chatList");
  if(!S.chars.length){g.innerHTML='<div style="padding:60px 20px;text-align:center;color:var(--text2);font-size:14px;line-height:2">还没有角色
    点右上角 + 创建</div>';return}
  g.innerHTML=S.chars.map(c=>{
    const m=c.system_prompt.match(/说话风格[：:](\S+)/);
    return `<div class="char-card" onclick="openChar('${esc(c.id)}')">
      <div class="name">${esc(c.name)}</div>
      ${m?`<div class="tags"><span class="tag">${esc(m[1])}</span></div>`:''}
      <div class="desc">${esc(c.system_prompt.slice(0,70))}</div>
      <div class="char-card-actions">
        <button class="del-btn" onclick="event.stopPropagation();confirm('删除「${esc(c.name)}」？','所有对话和记忆将被永久删除。',()=>delChar('${c.id}'))">删除角色</button>
      </div>
    </div>`}).join('');
}
async function delChar(id){await API.del('/api/characters/'+id);if(S.curChar===id)showScr("list");loadList();showToast('已删除')}
async function newCharacter(){const d=await API.post('/api/characters',{name:'新角色',system_prompt:'你是一个友善的AI助手。',greeting:'你好！'});S.chars.push(d);openChar(d.id)}

async function loadChat(){
  const c=document.getElementById('chatMessages');
  if(!S.curChar){c.innerHTML='<div class="empty-state">选择一个角色开始聊天</div>';return}
  try{
    const convs=await API.get('/api/chat/conversations?character_id='+S.curChar);
    if(convs.length){const v=await API.get('/api/chat/conversations/'+convs[0].id);S.curConv=v.id;renderMsgs(v.messages||[])}
    else{const ch=S.chars.find(x=>x.id===S.curChar);renderMsgs(ch&&ch.greeting?[{role:'assistant',content:ch.greeting,id:'g',created_at:new Date().toISOString()}]:[])}
  }catch{c.innerHTML='<div class="empty-state">加载失败</div>'}
}
function renderMsgs(msgs){
  const c=document.getElementById('chatMessages');
  if(!msgs.length){c.innerHTML='<div class="empty-state">开始一段新对话吧</div>';return}
  c.innerHTML=msgs.map(m=>{const mid=esc(m.id||Math.random().toString(36).slice(2));return `<div class="msg ${m.role}" id="msg-${mid}">${esc(m.content||'')}<div class="time">${new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>${m.role==='assistant'?`<button class="spk" onclick="speak('${mid}')">🔊</button>`:''}</div>`}).join('');
  scrollChat();
}
function scrollChat(){setTimeout(()=>{const e=document.getElementById('chatMessages');e.scrollTop=e.scrollHeight},80)}

async function sendMsg(){
  const inp=document.getElementById('chatInput'),btn=document.getElementById('sendBtn');
  const msg=inp.value.trim(),imgs=S.pendingImg;
  if((!msg&&!imgs.length)||S.sending||!S.curChar)return;
  S.sending=true;btn.disabled=true;btn.style.background='#bbb';inp.value='';S.pendingImg=[];document.getElementById('imgPreview').innerHTML='';
  const con=document.getElementById('chatMessages');const e=con.querySelector('.empty-state');if(e)con.innerHTML='';
  con.innerHTML+=`<div class="msg user">${esc(msg||'[图片]')}${imgs.length?`<br><img src="data:image/jpeg;base64,${imgs[0]}" style="max-width:200px;border-radius:8px">`:''}<div class="time">刚刚</div></div>`;
  con.innerHTML+=`<div class="msg assistant" style="opacity:.6;background:var(--msg-ai)" id="strm"><span class="loading"></span> 思考中...</div>`;scrollChat();
  try{
    const d=await API.post('/api/chat',{conversation_id:S.curConv,character_id:S.curChar,message:msg,images:imgs});
    S.curConv=d.conversation_id;const mid=Math.random().toString(36).slice(2);
    document.getElementById('streamMsg').remove();
    con.innerHTML+=`<div class="msg assistant" id="msg-${mid}">${esc(d.reply)}<div class="time">刚刚</div><button class="spk" onclick="speak('${mid}')">🔊</button></div>`;
    scrollChat();if(S.tts||S.vMode)speak(mid);
  }catch{const el=document.getElementById('streamMsg');if(el)el.remove();showToast('发送失败')}
  S.sending=false;btn.disabled=false;btn.style.background='';inp.focus();
}

function onImgPick(e){const f=e.target.files[0];if(!f)return;e.target.value='';const p=document.getElementById('imgPreview');const d=document.createElement('div');d.className='thumb';const r=new FileReader();r.onload=async function(ev){d.innerHTML=`<img src="${ev.target.result}"><div class="remove" onclick="S.pendingImg=[];document.getElementById('imgPreview').innerHTML=''">✕</div>`;p.innerHTML='';p.appendChild(d);try{const data=await API.upload(f);S.pendingImg=[data.base64]}catch{showToast('上传失败');p.innerHTML=''}};r.readAsDataURL(f)}

function startVoice(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){showToast('浏览器不支持语音');return}
  if(S.rec){stopVoice();return}
  const R=window.SpeechRecognition||window.webkitSpeechRecognition;const rec=new R();rec.lang='zh-CN';rec.continuous=true;rec.interimResults=true;
  S.sr=rec;S.rec=true;
  document.getElementById('voiceIndicator').classList.add('active');document.getElementById('micBtn').classList.add('active');
  document.getElementById('voiceText').textContent='正在聆听...';let ft='';
  rec.onresult=function(e){let im='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)ft+=e.results[i][0].transcript;else im=e.results[i][0].transcript}document.getElementById('voiceText').textContent=ft+im||'聆听中...'};
  rec.onerror=function(){stopVoice();showToast('语音识别出错')};
  rec.onend=function(){if(S.rec)try{rec.start()}catch{}};
  rec.start();setTimeout(()=>{if(S.rec&&ft)stopVoice(ft)},10000);
}
function stopVoice(ft){S.rec=false;try{if(S.sr){S.sr.stop();S.sr=null}}catch{}document.getElementById('voiceIndicator').classList.remove('active');document.getElementById('micBtn').classList.remove('active');const inp=document.getElementById('chatInput');const t=ft||document.getElementById('voiceText').textContent;if(t&&t!=='正在聆听...'&&t!=='聆听中...'&&t!=''){inp.value+=(inp.value?' ':'')+t;inp.focus();if(S.vMode)sendMsg()}document.getElementById('voiceText').textContent='正在聆听...'}
function toggleVoiceMode(){S.vMode=!S.vMode;document.getElementById("voiceBtn").textContent=S.vMode?'🔊':'🎤';document.getElementById("voiceBtn").className='hrbtn'+(S.vMode?' active':'');showToast(S.vMode?'语音对话模式 开':'语音对话模式 关');if(S.vMode&&S.curChar)startVoice()}

function toggleTTS(){S.tts=!S.tts;updateTTSBtn();document.getElementById('ttsBar').classList.toggle('show',S.tts);showToast(S.tts?'朗读已开启':'朗读已关闭')}
function updateTTSBtn(){const b=document.getElementById("ttsBtn");b.textContent=S.tts?'🔊朗读':'朗读';b.className='hrbtn'+(S.tts?' active':'')}

async function speak(id){
  const el=document.getElementById('msg-'+id);if(!el)return;
  let txt=el.textContent.replace(/刚刚|朗读/g,'').trim();if(!txt)return;
  const clean=txt.replace(/[*#`\[\]()>|]/g,'').trim().slice(0,1000);if(!clean)return;
  window.speechSynthesis.cancel();
  const rate=parseInt(document.getElementById('ttsRate').value)/10;
  const pitch=parseInt(document.getElementById('ttsPitch').value)/10;
  try{
    const r=await fetch('/api/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:clean,rate:rate,pitch:pitch})});
    if(r.ok){const b=await r.blob();const u=URL.createObjectURL(b);const a=new Audio(u);a.play();a.onended=()=>URL.revokeObjectURL(u);return}
  }catch{}
  if(!('speechSynthesis' in window))return;
  const u=new SpeechSynthesisUtterance(clean);u.lang='zh-CN';u.rate=rate;u.pitch=pitch;
  const vs=window.speechSynthesis.getVoices();
  u.voice=vs.find(v=>v.lang.startsWith('zh')&&(v.name.includes('Xiaoxiao')||v.name.includes('Natural')))||vs.find(v=>v.lang.startsWith('zh'));
  window.speechSynthesis.speak(u);
}
document.getElementById('ttsRate').oninput=function(){document.getElementById('ttsRateVal').textContent=(this.value/10).toFixed(1)};
document.getElementById('ttsPitch').oninput=function(){document.getElementById('ttsPitchVal').textContent=(this.value/10).toFixed(1)};
if('speechSynthesis' in window)window.speechSynthesis.getVoices();
setTimeout(()=>{if('speechSynthesis' in window)window.speechSynthesis.getVoices()},500);

async function loadTraits(){const c=document.getElementById('traitsList');if(!S.curChar){c.innerHTML='';return}
  try{const tr=await API.get('/api/traits?character_id='+S.curChar);if(!tr.length){c.innerHTML='<div style="padding:40px;text-align:center;color:var(--text2);font-size:13px">AI 会自动从对话中学习你的特征</div>';return}
  c.innerHTML=tr.map(t=>`<div class="trait-item"><div><div class="key">${esc(t.trait_key)}</div><div class="val">${esc(t.trait_value)}</div><div style="font-size:10px;color:var(--text2);margin-top:2px">${t.source==='manual'?'手动':'AI提取'}</div></div><div class="trait-actions"><button onclick="delTrait('${t.id}')">✕</button></div></div>`).join('')}catch{}}
async function addTrait(){const k=document.getElementById('traitKey').value.trim(),v=document.getElementById('traitVal').value.trim();if(!k||!v||!S.curChar)return;document.getElementById('traitKey').value='';document.getElementById('traitVal').value='';await API.post('/api/traits/manual?character_id='+S.curChar+'&trait_key='+encodeURIComponent(k)+'&trait_value='+encodeURIComponent(v));loadTraits();showToast('已添加')}
async function delTrait(id){await API.del('/api/traits/'+id);loadTraits()}

const PT=['温柔','高冷','幽默','毒舌','傲娇','元气','沉稳','活泼','知性','可爱','御姐','中二','治愈','腹黑'];
const SS=[{v:'自然的',l:'日常口语'},{v:'正式的',l:'正式文雅'},{v:'幽默的',l:'幽默风趣'},{v:'古风的',l:'古风诗意'},{v:'萌系的',l:'萌系可爱'}];

function loadEditor(){
  const c=document.getElementById('charEditor');if(!S.curChar){c.innerHTML='';return}
  const ch=S.chars.find(x=>x.id===S.curChar);if(!ch)return
  const p=ch.system_prompt||'';const gf=l=>{const m=p.match(new RegExp(l+'[：:]([^\\n]+)'));return m&&m[1]?m[1].trim():''};
  const tags=PT.filter(t=>p.includes('['+t+']'));const style=SS.find(s=>p.includes('说话风格：'+s.v))||SS[0];
  c.innerHTML=`<div><label>角色名称</label><input id="eName" value="${esc(ch.name)}"></div>
    <div><label>性格标签</label><div class="tag-selector" id="eTags">${PT.map(t=>`<button class="${tags.includes(t)?'sel':''}" onclick="this.classList.toggle('sel')">${t}</button>`).join('')}</div></div>
    <div><label>说话风格</label><select id="eStyle">${SS.map(s=>`<option value="${s.v}" ${style.v===s.v?'selected':''}>${s.l}</option>`).join('')}</select></div>
    <div><label>背景故事</label><textarea id="eBg" rows="2" placeholder="角色的出身、经历...">${esc(gf('背景'))}</textarea></div>
    <div><label>擅长的领域</label><input id="eSkill" value="${esc(gf('擅长'))}" placeholder="编程、绘画、音乐..."></div>
    <div><label>喜欢的事物</label><input id="eLikes" value="${esc(gf('喜好'))}" placeholder="猫、咖啡、雨天..."></div>
    <div><label>讨厌的事物</label><input id="eHates" value="${esc(gf('厌恶'))}" placeholder="吵闹、拖延..."></div>
    <div><label>开场白</label><textarea id="eGreet" rows="2">${esc(ch.greeting)}</textarea></div>
    <div><label>创造力</label><input id="eTemp" value="${esc(ch.temperature)}" type="number" step=".1" min="0" max="2"><div class="hint">0.7稳重 · 0.9平衡 · 1.2创意</div></div>
    <button class="save-btn" onclick="saveChar()">保存设定</button>
    <button class="delete-char-btn" onclick="confirm('删除「${esc(ch.name)}」？','所有对话和记忆将被永久删除。',()=>delChar('${ch.id}'))">删除此角色</button>`;}

async function saveChar(){
  if(!S.curChar)return;const n=document.getElementById('eName').value;
  const tags=Array.from(document.querySelectorAll('#eTags .sel')).map(b=>'['+b.textContent+']').join(' ');
  const style=document.getElementById('eStyle').value;let p='';const f=v=>document.getElementById(v).value.trim();
  if(tags)p+=`性格：${tags}\n`;if(style)p+=`说话风格：${style}\n`;
  if(f('eBg'))p+=`背景：${f('eBg')}\n`;if(f('eSkill'))p+=`擅长：${f('eSkill')}\n`;
  if(f('eLikes'))p+=`喜好：${f('eLikes')}\n`;if(f('eHates'))p+=`厌恶：${f('eHates')}\n`;
  p+=`\n你是${n}，请根据以上设定与用户交流。`;
  await API.put('/api/characters/'+S.curChar,{name:n,system_prompt:p,greeting:document.getElementById('eGreet').value,temperature:parseFloat(document.getElementById('eTemp').value)||.8});
  document.getElementById('headerTitle').textContent=n;showToast('保存成功');
}

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function showToast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1800)}
loadList();
</script>
