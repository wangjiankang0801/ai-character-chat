services:
  - type: web
    name: ai-character-chat
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: deepseek
      - key: DATABASE_URL
        fromDatabase:
          name: character-chat-db
          property: connectionString

databases:
  - name: character-chat-db
    plan: free
    region: singapore
    databaseName: character_chat
    ipAllowList: []
